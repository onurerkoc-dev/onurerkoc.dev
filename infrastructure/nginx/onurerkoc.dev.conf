server {
    listen 80;
    listen [::]:80;

    server_name www.onurerkoc.dev;

    return 301 https://onurerkoc.dev$request_uri;
}

server {
    listen 80;
    listen [::]:80;

    server_name onurerkoc.dev;

    return 301 https://onurerkoc.dev$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name www.onurerkoc.dev;

    ssl_certificate /etc/letsencrypt/live/onurerkoc.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onurerkoc.dev/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://onurerkoc.dev$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name onurerkoc.dev;

    ssl_certificate /etc/letsencrypt/live/onurerkoc.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onurerkoc.dev/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}